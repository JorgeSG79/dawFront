<div class="container py-4" style="max-width: 720px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">{{ isEditMode ? 'Editar estación de recarga' : 'Nueva estación de recarga' }}</h4>
    <a routerLink="/dashboard" class="btn btn-sm btn-outline-secondary">
      <i class="fa-solid fa-arrow-left me-1"></i> Volver
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <form (ngSubmit)="submit()">
        <div class="row g-3">

          <div class="col-12">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [value]="stationData.nombre"
              (input)="updateField('nombre', $event)" placeholder="Ej: Hub Canalejas" />
          </div>

          <div class="col-12">
            <label class="form-label">Dirección <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [value]="stationData.direccion"
              (input)="updateField('direccion', $event)" placeholder="Calle, número..." />
          </div>

          <div class="col-md-6">
            <label class="form-label">Ciudad <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [value]="stationData.ciudad"
              (input)="updateField('ciudad', $event)" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Provincia <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [value]="stationData.provincia"
              (input)="updateField('provincia', $event)" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Código postal</label>
            <input type="text" class="form-control" [value]="stationData.codigo_postal"
              (input)="updateField('codigo_postal', $event)" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Latitud <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [value]="stationData.latitud"
              (input)="updateField('latitud', $event)" placeholder="Ej: 40.4168" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Longitud <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [value]="stationData.longitud"
              (input)="updateField('longitud', $event)" placeholder="Ej: -3.7038" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Tarifa <span class="text-danger">*</span></label>
            <select class="form-select" [value]="stationData.tarifa_id" (change)="updateTarifa($event)">
              @for (tarifa of tarifasDisponibles; track tarifa.id) {
                <option [value]="tarifa.id">{{ tarifa.nombre }}</option>
              }
            </select>
            <small class="text-muted">Selecciona una de las 3 tarifas existentes.</small>
          </div>

          <div class="col-md-6">
            <label class="form-label">Número de puntos <span class="text-danger">*</span></label>
            <input type="number" min="0" class="form-control"
              [value]="stationData.num_puntos ?? ''"
              (input)="updateNumPoints($event)" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Conectores disponibles</label>
            <input type="text" class="form-control" [value]="stationData.conectores_disponibles"
              (input)="updateField('conectores_disponibles', $event)"
              placeholder="Ej: Type 2, CCS" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Estado</label>
            <select class="form-select" [value]="stationData.activo" (change)="updateActivo($event)">
              <option [value]="1">Activo</option>
              <option [value]="0">Inactivo</option>
            </select>
          </div>

        </div>

        @if (error) {
          <div class="alert alert-danger mt-4 mb-0">{{ error }}</div>
        }

        @if (success) {
          <div class="alert alert-success mt-4 mb-0">
            {{ isEditMode ? 'Estación actualizada correctamente.' : 'Estación creada correctamente.' }}
          </div>
        }

        <div class="d-flex justify-content-end mt-4">
          <button type="submit" class="btn btn-primary" [disabled]="loading">
            @if (loading) {
              <span class="spinner-border spinner-border-sm me-1" role="status"></span>
            }
            {{ isEditMode ? 'Actualizar estación' : 'Guardar estación' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
