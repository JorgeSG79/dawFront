<div class="card p-4 shadow-sm mx-auto mt-5" style="max-width: 400px;">
  <h2 class="mb-4 text-center">Recuperar acceso</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="email" class="form-label">Email:</label>
      <input
        id="email"
        type="email"
        [value]="email"
        (input)="onEmailInput($event)"
        (blur)="markEmailTouched()"
        placeholder="Ingresa tu email"
        required
        class="form-control"
        [class.is-invalid]="emailTouched && !isValidEmail()"
      />
      @if (emailTouched && !isValidEmail()) {
        <div class="invalid-feedback">
          @if (isEmailEmpty()) {
            Email requerido.
          } @else {
            Ingresa un email válido.
          }
        </div>
      }
    </div>
    <button type="submit" [disabled]="!isValidEmail() || isLoading()" class="btn btn-primary w-100">
      @if (isLoading()) {
        Enviando...
      } @else {
        Enviar email de recuperación
      }
    </button>
  </form>
  @if (message()) {
    <div class="alert alert-info mt-3">{{ message() }}</div>
  }
  <p class="text-center mt-3 mb-0"><a routerLink="/">Volver al login</a></p>
</div>
